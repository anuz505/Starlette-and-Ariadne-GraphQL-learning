scalar DateTime

enum RoleEnum {DEVELOPER PROJECT_MANAGER}
enum PriorityEnum {LOW MEDIUM HIGH}
enum StatusEnum {TODO IN_PROGRESS DONE}

type User{
    id: ID!
    username: String!
    email: String!
    created_at: DateTime!
    updated_at: DateTime!
    role: RoleEnum!
}

type Project {
  id: ID!
  title: String!
  owner_id: ID!
  owner: User!
  created_at: DateTime!
  updated_at: DateTime!
  tasks: [Task!]!
}

type Task{
    id: ID!
    description: String!
    priority: PriorityEnum!
    status: StatusEnum!
    project_id: ID!
    project: Project!
    assignee_id: ID
    assignee: User
    created_at: DateTime!
    updated_at: DateTime!
}

input CreateUserInput {username: String! email: String! password: String! role: RoleEnum!}
input CreateProjectInput {title: String! owner_id: ID!}
input UpdateProjectInput {title: String owner_id: ID}
input CreateTaskInput {description: String! priority: PriorityEnum! status: StatusEnum! project_id: ID! assignee_id: ID!}
input UpdateTaskInput { title: String description: String priority: PriorityEnum status: StatusEnum assignee_id: ID }
type Query{
    hello_world: String! # TODO remove hello world example
    users: [User!]!
    user(id: ID!): User
    projects: [Project!]!
    project(id: ID!): Project!
    tasks: [Task!]!
    task(id: ID!): Task
}


type Mutation{
    createUser(input: CreateUserInput!): User!
    createProject(input: CreateProjectInput!): Project!
    createTask(input: CreateTaskInput): Task!
    updateTask(id: ID!, input: UpdateTaskInput): Task!
    updateProject(id: ID!, input: UpdateProjectInput): Project!
    deleteTask(id: ID!): Boolean!
    deleteProject(id: ID!): Boolean!
}